<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K8S Score Board</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 700px;
            margin: auto;
        }

        h1 {
            text-align: center;
            color: #38bdf8;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background: #38bdf8;
            color: black;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #334155;
            text-align: left;
        }

        th {
            color: #38bdf8;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Kubernetes Score Board</h1>

    <div class="card">

        <form method="POST" action="/add">

            <input type="text" name="player" placeholder="Player Name" required>

            <input type="number" name="score" placeholder="Score" required>

            <button type="submit">Add Score</button>

        </form>

    </div>

    <div class="card">

        <table>

            <tr>
                <th>Player</th>
                <th>Score</th>
            </tr>

            {% for score in scores %}
            <tr>
                <td>{{ score[0] }}</td>
                <td>{{ score[1] }}</td>
            </tr>
            {% endfor %}

        </table>

    </div>

</div>

</body>
</html>

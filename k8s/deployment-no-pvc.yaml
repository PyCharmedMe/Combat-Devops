apiVersion: apps/v1
kind: Deployment

metadata:
  name: score-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: score-app

  template:
    metadata:
      labels:
        app: score-app

    spec:
      containers:
        - name: score-app
          image: score-app:v1
          imagePullPolicy: Never

          ports:
            - containerPort: 5000